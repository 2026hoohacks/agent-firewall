services:
  - type: web
    name: agentguard-dashboard
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn agentguard.__main__:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.0
      - key: SECRET_KEY
        generateValue: true
      # - key: AUTH0_CLIENT_ID
      #   value: ""
      # - key: AUTH0_CLIENT_SECRET
      #   value: ""
