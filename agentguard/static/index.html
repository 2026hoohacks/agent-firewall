<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgentGuard Demo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="header-left">
            <div class="logo">
                <span class="shield">🛡️</span> AgentGuard
            </div>
        </div>
        <div class="header-center">
            <div class="status-indicator">
                <span class="pulse"></span>
                Monitoring Agent Activity...
            </div>
        </div>
        <div class="header-right">
            <button type="button" id="btn-clear" class="clear-feed-btn">Clear Feed</button>
        </div>
    </header>

    <main>
        <div class="feed-container">
            <div class="feed-header">
                <h2>Live Activity Feed</h2>
                <span class="feed-subtitle">Real-time file system access events</span>
            </div>
            
            <div id="feed" class="feed">
                <!-- Feed items will be injected here via SSE -->
                <div class="empty-state" id="empty-state">
                    Waiting for agent to act...
                </div>
            </div>
        </div>
    </main>

    <!-- Block Card Popup Overlay -->
    <div id="block-overlay" class="overlay hidden">
        <div class="block-card">
            <div class="block-header">
                <div class="block-icon">🛑</div>
                <h2>AgentGuard blocked an action</h2>
            </div>
            <div class="block-body">
                <p>Your AI tried to access:</p>
                <div class="path-display" id="block-path">~/.ssh/id_rsa</div>
                <p class="explanation" id="block-explanation">This file contains your private key. Exposing it could compromise your accounts.</p>
            </div>
            <div class="block-actions">
                <button id="btn-allow" class="btn-allow">Allow Once</button>
                <button id="btn-block" class="btn-block">Block</button>
            </div>
        </div>
    </div>

    <script src="interceptor_demo.js"></script>
</body>
</html>
