<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AgentGuard{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
              mono: ['JetBrains Mono', 'ui-monospace', 'monospace'],
            },
            colors: {
              border: "hsl(var(--border))",
              input: "hsl(var(--input))",
              ring: "hsl(var(--ring))",
              background: "hsl(var(--background))",
              foreground: "hsl(var(--foreground))",
              primary: {
                DEFAULT: "hsl(var(--primary))",
                foreground: "hsl(var(--primary-foreground))",
              },
              secondary: {
                DEFAULT: "hsl(var(--secondary))",
                foreground: "hsl(var(--secondary-foreground))",
              },
              destructive: {
                DEFAULT: "hsl(var(--destructive))",
                foreground: "hsl(var(--destructive-foreground))",
              },
              muted: {
                DEFAULT: "hsl(var(--muted))",
                foreground: "hsl(var(--muted-foreground))",
              },
              accent: {
                DEFAULT: "hsl(var(--accent))",
                foreground: "hsl(var(--accent-foreground))",
              },
              popover: {
                DEFAULT: "hsl(var(--popover))",
                foreground: "hsl(var(--popover-foreground))",
              },
              card: {
                DEFAULT: "hsl(var(--card))",
                foreground: "hsl(var(--card-foreground))",
              },
            },
            borderRadius: {
              lg: "var(--radius)",
              md: "calc(var(--radius) - 2px)",
              sm: "calc(var(--radius) - 4px)",
            },
          }
        }
      }
    </script>
    <style type="text/tailwindcss">
      @layer base {
        :root {
          /* Zinc Dark Theme exact values */
          --background: 240 10% 3.9%;
          --foreground: 0 0% 98%;
          --card: 240 10% 3.9%;
          --card-foreground: 0 0% 98%;
          --popover: 240 10% 3.9%;
          --popover-foreground: 0 0% 98%;
          --primary: 0 0% 98%;
          --primary-foreground: 240 5.9% 10%;
          --secondary: 240 3.7% 15.9%;
          --secondary-foreground: 0 0% 98%;
          --muted: 240 3.7% 15.9%;
          --muted-foreground: 240 5% 64.9%;
          --accent: 240 3.7% 15.9%;
          --accent-foreground: 0 0% 98%;
          --destructive: 0 62.8% 30.6%;
          --destructive-foreground: 0 0% 98%;
          --border: 240 3.7% 15.9%;
          --input: 240 3.7% 15.9%;
          --ring: 240 4.9% 83.9%;
          --radius: 0.5rem;
        }
      }
      @layer components {
        /* JS bounded classes */
        .event-li {
            @apply border border-border rounded-lg p-3 mb-2 cursor-pointer transition-colors hover:border-muted-foreground/50 bg-card text-card-foreground;
        }
        .event-li.is-selected {
            @apply border-primary bg-accent/50 ring-1 ring-primary/20;
        }
        .event-li-main { @apply flex flex-col gap-1; }
        .event-type { @apply text-xs font-mono text-primary font-medium; }
        .event-desc { @apply text-sm text-muted-foreground; }
        .event-li-meta { @apply flex flex-wrap gap-2 mt-2 items-center; }
        .event-li-meta .time { @apply text-[0.7rem] text-muted-foreground ml-auto font-mono; }
        .event-empty { @apply p-6 text-center text-sm text-muted-foreground border border-dashed rounded-lg border-border bg-muted/10; }

        .badge {
            @apply inline-flex items-center rounded-md border border-border px-2 py-0.5 text-xs font-semibold transition-colors focus:outline-none focus:ring-2 focus:ring-ring focus:ring-offset-2;
        }
        .sev-high { @apply bg-destructive text-destructive-foreground border-transparent border hover:bg-destructive/80; }
        .sev-med { @apply bg-yellow-600 text-primary-foreground border-transparent border hover:bg-yellow-600/80; }
        .sev-low { @apply bg-green-600 text-primary-foreground border-transparent border hover:bg-green-600/80; }
        
        .st-pending { @apply bg-yellow-600 text-primary-foreground border-transparent border hover:bg-yellow-600/80; }
        .st-ok { @apply bg-green-600 text-primary-foreground border-transparent border hover:bg-green-600/80; }
        .st-bad { @apply bg-destructive text-destructive-foreground border-transparent border hover:bg-destructive/80; }
        
        .badge-allowed { @apply bg-green-600 text-primary-foreground border-transparent; }
        .badge-blocked { @apply bg-destructive text-destructive-foreground border-transparent; }
      }
    </style>
    <link rel="stylesheet" href="/static/styles.css">
    {% block head_extra %}{% endblock %}
</head>
<body class="min-h-screen bg-background text-foreground antialiased {% block body_class %}{% endblock %}">
    {% if show_nav is not defined or show_nav %}
    <header class="top-nav">
        <div class="nav-inner">
            <a href="/" class="brand">
                <span class="brand-icon" aria-hidden="true">◆</span>
                <span>AgentGuard</span>
            </a>
            <nav class="nav-links">
                {% if show_app_nav %}
                <a href="/dashboard" class="nav-link">Dashboard</a>
                <a href="/report" class="nav-link">Report</a>
                {% endif %}
            </nav>
        </div>
    </header>
    {% endif %}
    <main class="container mx-auto max-w-screen-xl py-6 px-6">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
